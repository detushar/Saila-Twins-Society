name: Update Dashboard Data
on:
  schedule:
    - cron: '*/30 * * * *' # Corrected: This runs every 30 minutes
  workflow_dispatch: # Allows you to test it manually from the "Actions" tab
permissions:
  contents: write
jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Fetch data from Apps Script
        run: |
          # Use -f to fail the step if the URL returns an error (404, 500, etc.)
          curl -f -L -o data.json \
          "https://script.google.com/macros/s/AKfycbz23uiQuQGOapghi_ky6oQ3_xRFPxS-ogoj1cN4V5WiKaFGI4he4V90YM6P3T3tQcYV/exec?action=data"

      - name: Commit and push if data changed
        run: |
          git config user.email "github-actions@github.com"
          git config user.name "GitHub Actions"
          git add data.json
          # Only commit and push if there are actual changes in data.json
          if ! git diff --staged --quiet; then
            git commit -m "Update dashboard data"
            git push
          else
            echo "No changes detected in data.json"
          fi
